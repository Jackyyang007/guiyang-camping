<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贵阳露营地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-900: #1B4332;
  --green-700: #2D6A4F;
  --green-500: #40916C;
  --green-200: #95D5B2;
  --green-50: #e8f5e9;
  --orange: #E76F51;
  --orange-light: #F4A261;
  --gray-100: #f8f9fa;
  --gray-200: #e9ecef;
  --gray-400: #adb5bd;
  --gray-600: #6c757d;
  --gray-800: #343a40;
  --text: #1a1a2e;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--gray-100);
  color: var(--text);
  line-height: 1.6;
}

/* Banner */
.banner {
  background: linear-gradient(135deg, var(--green-900) 0%, var(--green-700) 50%, var(--green-500) 100%);
  color: white;
  padding: 32px 20px 24px;
}
.banner-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.banner-left { display: flex; align-items: center; gap: 12px; }
.banner h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.banner h1 i { color: var(--orange-light); }
.banner-subtitle { font-size: 13px; opacity: 0.85; }

/* Banner Search */
.banner-search {
  max-width: 1200px;
  margin: 14px auto 0;
  position: relative;
}
.banner-search i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray-400);
}
.banner-search input {
  width: 100%;
  padding: 11px 14px 11px 40px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
  transition: background 0.2s;
}
.banner-search input::placeholder { color: rgba(255,255,255,0.6); }
.banner-search input:focus { background: rgba(255,255,255,0.35); }

/* Controls */
.controls {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 20px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.sort-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--gray-600);
}
.sort-wrap select {
  padding: 7px 12px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 13px;
  outline: none;
  background: white;
  cursor: pointer;
}

/* Filter Tags */
.filter-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.filter-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  background: white;
  color: var(--gray-600);
  user-select: none;
}
.filter-tag:hover { border-color: var(--green-200); color: var(--green-700); }
.filter-tag.active {
  background: var(--green-700);
  color: white;
  border-color: var(--green-700);
}
.filter-tag i { font-size: 11px; }

/* Result count */
.result-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 8px;
  font-size: 13px;
  color: var(--gray-600);
}
.result-bar span { font-weight: 600; color: var(--green-700); }

/* Map */
.map-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 20px;
}
#map {
  height: 200px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  z-index: 1;
}
.leaflet-popup-content h3 { font-size: 15px; margin-bottom: 4px; color: var(--green-700); }
.leaflet-popup-content p { font-size: 12px; color: var(--gray-600); margin-bottom: 4px; }
.leaflet-popup-content .popup-tags { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 3px; }
.leaflet-popup-content .popup-tag {
  font-size: 10px;
  padding: 2px 8px;
  background: var(--green-50);
  color: var(--green-700);
  border-radius: 10px;
}
.leaflet-popup-content .popup-rating { color: var(--orange); font-size: 13px; }

/* Cards Grid */
.cards-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 40px;
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* Card */
.card {
  background: white;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.card-img {
  position: relative;
  height: 180px;
  overflow: hidden;
  background: var(--gray-200);
}
.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}
.card:hover .card-img img { transform: scale(1.05); }
.card-img .distance-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.65);
  color: white;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  backdrop-filter: blur(4px);
}
.card-img .rating-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(255,255,255,0.9);
  color: var(--orange);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}
.card-body { padding: 16px; }
.card-body h3 {
  font-size: 16px;
  margin-bottom: 6px;
  color: var(--green-900);
}
.card-address {
  font-size: 12px;
  color: var(--gray-600);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-desc {
  font-size: 13px;
  color: var(--gray-800);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 10px;
  line-height: 1.5;
}
.card-facilities {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.card-facility {
  font-size: 11px;
  padding: 3px 10px;
  background: var(--green-50);
  color: var(--green-700);
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; align-items: center; justify-content: center; padding: 20px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal {
  background: white;
  border-radius: var(--radius);
  max-width: 680px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: slideUp 0.25s ease;
  box-shadow: var(--shadow-lg);
}
.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: background 0.2s;
}
.modal-close:hover { background: rgba(0,0,0,0.7); }
.modal-img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
}
.modal-body { padding: 24px; }
.modal-body h2 {
  font-size: 22px;
  color: var(--green-900);
  margin-bottom: 4px;
}
.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin: 12px 0 16px;
  font-size: 13px;
  color: var(--gray-600);
}
.modal-meta i { width: 16px; color: var(--green-500); }
.modal-desc {
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 16px;
  color: var(--gray-800);
}
.modal-section { margin-bottom: 20px; }
.modal-section h4 {
  font-size: 14px;
  color: var(--green-700);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.modal-transport {
  font-size: 13px;
  line-height: 1.7;
  color: var(--gray-800);
  padding: 12px;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
}
.modal-facilities {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.modal-facility {
  padding: 6px 14px;
  background: var(--green-50);
  color: var(--green-700);
  border-radius: 20px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.modal-tips {
  padding: 14px;
  background: #fff8e1;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: #856404;
  line-height: 1.7;
}
.modal-tips i { color: var(--orange-light); margin-right: 6px; }

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-400);
}
.empty-state i { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 15px; }

/* Footer */
.footer {
  text-align: center;
  padding: 30px 20px;
  color: var(--gray-400);
  font-size: 12px;
  border-top: 1px solid var(--gray-200);
}

/* Back to top */
.back-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--green-700);
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: background 0.2s;
}
.back-top:hover { background: var(--green-900); }
.back-top.show { display: flex; }

/* Responsive */
@media (max-width: 768px) {
  .banner { padding: 20px 16px 18px; }
  .banner h1 { font-size: 18px; }
  .banner-subtitle { display: none; }
  .banner-left { width: 100%; }
  .controls { padding: 10px 16px 0; flex-direction: column; align-items: stretch; }
  .sort-wrap { width: 100%; }
  .sort-wrap select { flex: 1; }
  .filter-bar { padding: 0 16px 8px; }
  .map-wrap { padding: 8px 12px; }
  #map { height: 160px; border-radius: var(--radius-sm); }
  .result-bar { padding: 0 16px 6px; }
  .cards-wrap { padding: 0 12px 30px; }
  .cards-grid { grid-template-columns: 1fr; gap: 14px; }
  .card-img { height: 150px; }
  .modal { margin: 10px; max-height: 85vh; }
  .modal-img { height: 180px; }
  .modal-body { padding: 16px; }
  .modal-body h2 { font-size: 18px; }
  .back-top { bottom: 16px; right: 16px; width: 38px; height: 38px; font-size: 15px; }
}
@media (max-width: 480px) {
  #map { height: 140px; }
  .cards-grid { gap: 12px; }
}

/* Scrollbar */
.modal::-webkit-scrollbar { width: 6px; }
.modal::-webkit-scrollbar-thumb { background: var(--gray-400); border-radius: 3px; }
</style>
</head>
<body>

<!-- Banner -->
<div class="banner">
  <div class="banner-inner">
    <div class="banner-left">
      <h1><i class="fas fa-campground"></i> 贵阳露营地图</h1>
      <span class="banner-subtitle"><i class="fas fa-map-pin"></i> 分享贵阳周边露营地和攻略</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;font-size:13px;opacity:0.85;">
      <span id="resultCountBanner">14</span> 个营地 <span style="opacity:0.4;">|</span>
      <i class="fas fa-arrow-down"></i>
    </div>
  </div>
  <div class="banner-search">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="搜索露营地..." oninput="renderCards()">
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="sort-wrap">
    <i class="fas fa-sort-amount-down"></i>
    <select id="sortSelect" onchange="renderCards()">
      <option value="default">默认排序</option>
      <option value="distance">距离最近</option>
      <option value="rating">评分最高</option>
    </select>
  </div>
</div>

<!-- Filter Bar -->
<div class="filter-bar" id="filterBar"></div>

<!-- Result Count -->
<div class="result-bar">共 <span id="resultCount">0</span> 个露营地</div>

<!-- Map -->
<div class="map-wrap"><div id="map"></div></div>

<!-- Cards -->
<div class="cards-wrap">
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- Footer -->
<footer class="footer">
  <i class="fas fa-tree"></i> 享受自然 · 无痕露营 · 安全第一
</footer>

<!-- Back to Top -->
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class="fas fa-arrow-up"></i>
</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ========== FACILITY CONFIG ==========
const facilityConfig = [
  { key: '停车场', icon: 'fa-solid fa-square-parking' },
  { key: '卫生间', icon: 'fa-solid fa-toilet' },
  { key: '水源', icon: 'fa-solid fa-faucet' },
  { key: '烧烤区', icon: 'fa-solid fa-fire' },
  { key: '淋浴', icon: 'fa-solid fa-shower' },
  { key: '装备租赁', icon: 'fa-solid fa-tent' },
  { key: '电源', icon: 'fa-solid fa-bolt' }
];

// ========== STATE ==========
let activeFilters = new Set();
let map = null;
let markers = [];
let currentSite = null;

// ========== INIT FILTERS ==========
function initFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = facilityConfig.map(f =>
    `<div class="filter-tag" data-key="${f.key}" onclick="toggleFilter('${f.key}')">
      <i class="${f.icon}"></i> ${f.key}
    </div>`
  ).join('');
}

// ========== TOGGLE FILTER ==========
function toggleFilter(key) {
  if (activeFilters.has(key)) activeFilters.delete(key);
  else activeFilters.add(key);
  document.querySelectorAll('.filter-tag').forEach(el => {
    el.classList.toggle('active', activeFilters.has(el.dataset.key));
  });
  renderCards();
}

// ========== RENDER CARDS ==========
function renderCards() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let filtered = campsites.filter(c => {
    if (activeFilters.size > 0) {
      const hasAll = [...activeFilters].every(f => c.facilities.includes(f));
      if (!hasAll) return false;
    }
    if (query) return c.name.includes(query) || c.address.includes(query);
    return true;
  });

  if (sort === 'distance') filtered.sort((a, b) => a.distance - b.distance);
  else if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);

  document.getElementById('resultCount').textContent = filtered.length;
  document.getElementById('resultCountBanner').textContent = filtered.length;

  const grid = document.getElementById('cardsGrid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <i class="fa-solid fa-map-pin"></i>
      <p>没有找到匹配的露营地</p>
    </div>`;
  } else {
    grid.innerHTML = filtered.map(c => {
      const stars = '⭐'.repeat(Math.round(c.rating));
      const facs = c.facilities.map(f => {
        const cfg = facilityConfig.find(x => x.key === f);
        return `<span class="card-facility"><i class="${cfg ? cfg.icon : ''}"></i> ${f}</span>`;
      }).join('');
      return `
        <div class="card" onclick="openModal(${c.id})">
          <div class="card-img">
            <img src="${c.images[0]}" alt="${c.name}" loading="lazy"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22600%22><rect fill=%22%2395D5B2%22 width=%22800%22 height=%22600%22/><text x=%22400%22 y=%22300%22 text-anchor=%22middle%22 fill=%22%232D6A4F%22 font-size=%2224%22 font-family=%22sans-serif%22>🏕️ ${c.name}</text></svg>'">
            <span class="distance-badge"><i class="fa-solid fa-location-dot"></i> ${c.distance}km</span>
            <span class="rating-badge">${stars}</span>
          </div>
          <div class="card-body">
            <h3>${c.name}</h3>
            <div class="card-address"><i class="fa-solid fa-map-pin"></i> ${c.address}</div>
            <div class="card-desc">${c.description}</div>
            <div class="card-facilities">${facs}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  updateMapMarkers(filtered);
}

// ========== MAP ==========
function initMap() {
  map = L.map('map', {
    center: [26.65, 106.63],
    zoom: 10,
    zoomControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(map);

  renderCards();
}

function updateMapMarkers(sites) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const allIds = new Set(sites.map(s => s.id));

  campsites.forEach(c => {
    if (!allIds.has(c.id)) return;
    const color = '#E76F51';
    const icon = L.divIcon({
      html: `<div style="
        background:${color};color:white;width:32px;height:32px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;font-size:14px;
        border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);
      "><i class="fa-solid fa-campground"></i></div>`,
      className: '',
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });

    const marker = L.marker([c.lat, c.lng], { icon }).addTo(map);
    const stars = '⭐'.repeat(Math.round(c.rating));
    marker.bindPopup(`
      <h3>${c.name}</h3>
      <p><i class="fa-solid fa-location-dot"></i> 距市区 ${c.distance}km</p>
      <p class="popup-rating">${stars}</p>
      <p>${c.address}</p>
      <div class="popup-tags">
        ${c.facilities.map(f => `<span class="popup-tag">${f}</span>`).join('')}
      </div>
      <p style="margin-top:6px"><a href="javascript:void(0)" onclick="openModal(${c.id})" style="color:#2D6A4F;font-weight:600;font-size:13px;">查看详情 →</a></p>
    `);
    marker.on('click', () => { currentSite = c.id; });
    markers.push(marker);
  });

  if (sites.length > 0 && markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.15));
    if (map.getZoom() > 14) map.setZoom(14);
  }
}

// ========== MODAL ==========
function openModal(id) {
  const c = campsites.find(s => s.id === id);
  if (!c) return;

  document.getElementById('modalImg').src = c.images[0] + '&t=' + Date.now();
  document.getElementById('modalImg').onerror = function() {
    this.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22600%22><rect fill=%22%2395D5B2%22 width=%22800%22 height=%22600%22/><text x=%22400%22 y=%22300%22 text-anchor=%22middle%22 fill=%22%232D6A4F%22 font-size=%2230%22 font-family=%22sans-serif%22>🏕️ ' + c.name + '</text></svg>';
  };

  const stars = '⭐'.repeat(Math.round(c.rating));
  const facs = c.facilities.map(f => {
    const cfg = facilityConfig.find(x => x.key === f);
    return `<span class="modal-facility"><i class="${cfg.icon}"></i> ${f}</span>`;
  }).join('');

  document.getElementById('modalBody').innerHTML = `
    <h2>${c.name}</h2>
    <div class="modal-meta">
      <span><i class="fa-solid fa-map-pin"></i> ${c.address}</span>
      <span><i class="fa-solid fa-location-dot"></i> 距市区 ${c.distance}km</span>
      <span>${stars}</span>
    </div>
    <div class="modal-desc">${c.description}</div>

    <div class="modal-section">
      <h4><i class="fa-solid fa-car"></i> 交通指引</h4>
      <div class="modal-transport">${c.transport}</div>
    </div>

    <div class="modal-section">
      <h4><i class="fa-solid fa-kitchen-set"></i> 生活设施</h4>
      <div class="modal-facilities">${facs}</div>
    </div>

    <div class="modal-section">
      <h4><i class="fa-solid fa-circle-info"></i> 温馨提示</h4>
      <div class="modal-tips">${c.tips}</div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  map.invalidateSize();

  // Scroll map to this campsite
  if (map) map.setView([c.lat, c.lng], 13);
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if (map) map.invalidateSize();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ========== BACK TO TOP ==========
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
});

// ========== INIT ==========
initFilters();
initMap();

// ========== MARKER TOGGLE FROM OUTSIDE ==========
// Expose openModal globally (already declared at top level)
